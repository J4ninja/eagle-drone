---
- name: Install systemd service and start script
  hosts: raspberrypi
  become: true
  tasks:
    - name: Ensure scripts directory exists
      ansible.builtin.file:
        path: /home/robot/eagle-drone/scripts
        state: directory
        owner: robot
        group: robot
        mode: "0755"

    - name: Pull latest code
      ansible.builtin.command: git pull
      args:
        chdir: /home/robot/eagle-drone
      become: true
      become_user: robot
      notify: Restart gstreamer-qgc

    - name: Install systemd unit file
      ansible.builtin.copy:
        src: /home/robot/eagle-drone/service/gstreamer-qgc.service
        dest: /etc/systemd/system/gstreamer-qgc.service
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart gstreamer-qgc

    - name: Ensure /etc/eagle-drone directory exists
      ansible.builtin.file:
        path: /etc/eagle-drone
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install environment file
      ansible.builtin.copy:
        src: /home/robot/eagle-drone/conf/gstreamer-qgc.env
        dest: /etc/eagle-drone/gstreamer-qgc.env
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      notify: Restart gstreamer-qgc

    - name: Enable and start service
      ansible.builtin.systemd:
        name: gstreamer-qgc.service
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart gstreamer-qgc
      ansible.builtin.systemd:
        name: gstreamer-qgc.service
        state: restarted